version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: assetguard-db
    restart: always
    volumes:
      - mongodb_data:/data/db

  api:
    build: .
    container_name: assetguard-api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/asset_protection_db
      - PORT=5000
    depends_on:
      - mongodb

volumes:
  mongodb_data:
